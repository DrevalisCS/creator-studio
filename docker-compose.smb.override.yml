# Docker compose override that points /app/storage at a remote SMB/CIFS
# share instead of the local ./storage directory. Use when you want the
# media library to live on a NAS or external disk shared over the LAN.
#
# Usage
# -----
#
#   1. Populate the ``SMB_*`` variables in .env (see below).
#   2. Verify the cifs kernel module is available on the host:
#        lsmod | grep cifs         # Linux
#      On Docker Desktop for Windows / macOS, cifs is already built
#      into the Linux VM — nothing to install.
#   3. Bring the stack up with BOTH compose files:
#        docker compose -f docker-compose.yml \
#                       -f docker-compose.smb.override.yml up -d
#
# .env example
# ------------
#
#   SMB_HOST=nas.lan                 # or 192.168.1.42
#   SMB_SHARE=drevalis-storage       # share name on the SMB host
#   SMB_USER=drevalis
#   SMB_PASS=correct-horse
#   SMB_DOMAIN=WORKGROUP             # optional
#   SMB_VERS=3.0                     # 3.0 recommended; 2.1 for old NAS
#   # File permissions seen inside the container. Match the app uid (see
#   # your Dockerfile USER directive) so writes don't need 0777.
#   SMB_UID=1000
#   SMB_GID=1000
#   SMB_FILE_MODE=0664
#   SMB_DIR_MODE=0775
#
# How it works
# ------------
#
# Docker Volume plugin ``local`` understands the ``cifs`` driver options
# out of the box (Linux only — kernel CIFS module). The ``app`` and
# ``worker`` services already mount ``./storage:/app/storage``; this
# override redefines that volume so the same in-container path is
# backed by the remote share.
#
# What you CANNOT swap with SMB
# -----------------------------
#
# * PostgreSQL data. SMB locking semantics are incompatible with the
#   way Postgres writes WAL files — keep ``postgres_data`` on the
#   local ``local`` driver (its definition stays in the base compose).
# * The updater sidecar's Docker socket — out of scope anyway.
#
# Performance note
# ----------------
#
# Scene generation + ffmpeg read/write large files sequentially. A
# 1 Gb/s LAN is enough; 100 Mb/s will bottleneck long-form video
# assembly. If latency matters, put only the finished ``output/`` +
# ``audiobooks/`` subfolders on SMB and keep ``scenes/`` +
# ``temp/`` local — you can do that with a per-subdir bind mount.

services:
  app:
    volumes:
      - storage_smb:/app/storage

  worker:
    volumes:
      - storage_smb:/app/storage

volumes:
  storage_smb:
    driver: local
    driver_opts:
      type: cifs
      # Leading ``//`` is the SMB URL scheme; anything after is
      # host/share. Docker's cifs driver passes this straight to
      # the Linux kernel mount.cifs helper.
      device: "//${SMB_HOST}/${SMB_SHARE}"
      o: >-
        username=${SMB_USER},
        password=${SMB_PASS},
        domain=${SMB_DOMAIN:-WORKGROUP},
        vers=${SMB_VERS:-3.0},
        uid=${SMB_UID:-1000},
        gid=${SMB_GID:-1000},
        file_mode=${SMB_FILE_MODE:-0664},
        dir_mode=${SMB_DIR_MODE:-0775},
        iocharset=utf8,
        nofail
