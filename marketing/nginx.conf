server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Make absolutely sure JS/CSS get the right MIME even if the base
    # image ever drops one from /etc/nginx/mime.types.
    types {
        application/javascript  js mjs;
        text/css                css;
        application/json        json;
        image/svg+xml           svg;
        text/html               html htm;
        image/png               png;
        image/jpeg              jpg jpeg;
        image/x-icon            ico;
        image/webp              webp;
        font/woff2              woff2;
    }
    default_type application/octet-stream;

    # Long-lived, immutable static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Installer scripts served as plain text so `curl | bash` / `iwr | iex`
    # work AND browsers display them inline for "read before running".
    location = /install.sh {
        default_type text/plain;
        add_header Cache-Control "no-cache";
        try_files /install.sh =404;
    }
    location = /install.ps1 {
        default_type text/plain;
        add_header Cache-Control "no-cache";
        try_files /install.ps1 =404;
    }

    # Clean URLs — /pricing resolves to /pricing.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Security headers on HTML responses
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
