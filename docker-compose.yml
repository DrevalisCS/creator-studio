services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: drevalis
      POSTGRES_PASSWORD: drevalis
      POSTGRES_DB: drevalis
    # Bind only to loopback so the DB never becomes publicly reachable
    # on a VPS. Dev tools on the host can still connect via
    # localhost:5432; the compose ``app`` service reaches it over the
    # internal network as ``postgres:5432``.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
    command: >
      postgres
      -c shared_buffers=1GB
      -c effective_cache_size=3GB
      -c work_mem=64MB
      -c max_connections=200
      -c random_page_cost=1.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drevalis"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Loopback-only: same reasoning as postgres above.
    ports:
      - "127.0.0.1:6379:6379"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ── FastAPI Application ─────────────────────────────────────────────────────
  # Runs `alembic upgrade head` inline before uvicorn. Previous setup used a
  # separate `migrate` one-shot with `depends_on.service_completed_successfully`,
  # but that deadlocked the stack (502 on all endpoints) when the migrate
  # container failed for any reason. Inline is more robust: every container
  # restart re-asserts schema, and an alembic failure surfaces in `app` logs
  # where operators actually look.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://drevalis:drevalis@postgres:5432/drevalis
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app/src
      UV_THREADPOOL_SIZE: "16"
    volumes:
      - ./storage:/app/storage
      - ./src:/app/src
      - updater_shared:/shared
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 8G
    command: >
      sh -c "/app/.venv/bin/python -m alembic upgrade head &&
             exec /app/.venv/bin/python -m uvicorn drevalis.main:app --host 0.0.0.0 --port 8000 --workers 4"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ── arq Worker ──────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://drevalis:drevalis@postgres:5432/drevalis
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app/src
    volumes:
      - ./storage:/app/storage
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "20"
          memory: 32G
    command: python -m arq drevalis.workers.settings.WorkerSettings
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'arq' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ── Updater sidecar ─────────────────────────────────────────────────────────
  # Watches /shared/do_update; on flag, pulls new images + restarts the stack.
  # Needs access to the host's Docker socket + this compose project directory.
  updater:
    build:
      context: ./docker/updater
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/project
      - updater_shared:/shared
    environment:
      POLL_SECONDS: "15"

  # ── Frontend (Vite + React) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_PROXY_TARGET: http://app:8000
      VITE_WS_PROXY_TARGET: ws://app:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    # Read-only root filesystem — the frontend container serves a static
    # bundle, it never writes to its own filesystem. ``tmpfs`` mounts
    # for the few paths nginx must be able to write to (pid file,
    # cache dir, log dir) keep the container fully functional while
    # eliminating any post-compromise persistence / path-traversal
    # write surface.
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
      - /var/cache/nginx:rw,noexec,nosuid,size=128m
      - /var/log/nginx:rw,noexec,nosuid,size=32m

# ── Defaults applied to every service via YAML anchors ─────────────────
# Not every service can use ``read_only: true`` (ffmpeg writes to /tmp,
# piper-dl needs /storage), so the anchor only covers the universally-
# safe hardening: no-new-privileges + a minimal capability set. Each
# service block above already carries these explicitly where tuning
# differs (e.g. frontend needs CHOWN/SETUID to chown /var/log/nginx).
x-hardening-defaults: &hardening-defaults
  security_opt:
    - no-new-privileges:true

volumes:
  postgres_data:
  updater_shared:
