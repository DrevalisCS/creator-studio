services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: shortsfactory
      POSTGRES_PASSWORD: shortsfactory
      POSTGRES_DB: shortsfactory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
    command: >
      postgres
      -c shared_buffers=1GB
      -c effective_cache_size=3GB
      -c work_mem=64MB
      -c max_connections=200
      -c random_page_cost=1.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortsfactory"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Alembic migrations (one-shot) ───────────────────────────────────────────
  # Runs `alembic upgrade head` once, then exits. `app` and `worker` wait on
  # this via `service_completed_successfully`, so a fresh DB — or a pulled
  # image whose models expect new columns — is always migrated before the
  # services try to read those columns and 500.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://shortsfactory:shortsfactory@postgres:5432/shortsfactory
      PYTHONPATH: /app/src
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"

  # ── FastAPI Application ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://shortsfactory:shortsfactory@postgres:5432/shortsfactory
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app/src
      UV_THREADPOOL_SIZE: "16"
    volumes:
      - ./storage:/app/storage
      - ./src:/app/src
      - updater_shared:/shared
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 8G
    command: python -m uvicorn shortsfactory.main:app --host 0.0.0.0 --port 8000 --workers 4

  # ── arq Worker ──────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://shortsfactory:shortsfactory@postgres:5432/shortsfactory
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app/src
    volumes:
      - ./storage:/app/storage
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "20"
          memory: 32G
    command: python -m arq shortsfactory.workers.settings.WorkerSettings
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'arq' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Updater sidecar ─────────────────────────────────────────────────────────
  # Watches /shared/do_update; on flag, pulls new images + restarts the stack.
  # Needs access to the host's Docker socket + this compose project directory.
  updater:
    build:
      context: ./docker/updater
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/project
      - updater_shared:/shared
    environment:
      POLL_SECONDS: "15"

  # ── Frontend (Vite + React) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_PROXY_TARGET: http://app:8000
      VITE_WS_PROXY_TARGET: ws://app:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
  updater_shared:
