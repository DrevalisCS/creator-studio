services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: drevalis
      POSTGRES_PASSWORD: drevalis
      POSTGRES_DB: drevalis
    # Bind only to loopback so the DB never becomes publicly reachable
    # on a VPS. Dev tools on the host can still connect via
    # localhost:5432; the compose ``app`` service reaches it over the
    # internal network as ``postgres:5432``.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          # Tunable via .env; defaults fit a 4-CPU / 8 GB minimum host.
          # Beefier workstations can raise via POSTGRES_CPUS / POSTGRES_MEMORY.
          cpus: "${POSTGRES_CPUS:-2}"
          memory: ${POSTGRES_MEMORY:-2G}
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=1536MB
      -c work_mem=32MB
      -c max_connections=200
      -c random_page_cost=1.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drevalis"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Loopback-only: same reasoning as postgres above.
    ports:
      - "127.0.0.1:6379:6379"
    deploy:
      resources:
        limits:
          cpus: "${REDIS_CPUS:-1}"
          memory: ${REDIS_MEMORY:-1G}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ── FastAPI Application ─────────────────────────────────────────────────────
  # Runs `alembic upgrade head` inline before uvicorn. Previous setup used a
  # separate `migrate` one-shot with `depends_on.service_completed_successfully`,
  # but that deadlocked the stack (502 on all endpoints) when the migrate
  # container failed for any reason. Inline is more robust: every container
  # restart re-asserts schema, and an alembic failure surfaces in `app` logs
  # where operators actually look.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://drevalis:drevalis@postgres:5432/drevalis
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app/src
      UV_THREADPOOL_SIZE: "16"
      # Shared structlog file — both app and worker write here so the
      # /api/v1/events endpoint can render a unified feed without
      # Docker-socket access. Both files live on the ``drevalis_logs``
      # named volume mounted below.
      LOG_FILE: /var/log/drevalis/app.json
    volumes:
      - ./storage:/app/storage
      - ./src:/app/src
      - updater_shared:/shared
      - drevalis_logs:/var/log/drevalis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      # 120s gives the FastAPI lifespan room to: run alembic
      # migrations (which can take 30-60s on a large DB after a
      # multi-version jump), open the asyncpg pool, init the Redis
      # arq pool (with up to ~35s of arq retry budget), and bind
      # the uvicorn socket — all before docker starts marking the
      # container unhealthy and tearing down dependents like
      # frontend / worker.
      start_period: 120s
    deploy:
      resources:
        limits:
          # Defaults fit a small VPS; raise via APP_CPUS / APP_MEMORY in
          # .env for beefier hosts. ``--workers 4`` already sets the
          # uvicorn fan-out independently of this cap.
          cpus: "${APP_CPUS:-4}"
          memory: ${APP_MEMORY:-4G}
    command: >
      sh -c "/app/.venv/bin/python -m alembic upgrade head &&
             exec /app/.venv/bin/python -m uvicorn drevalis.main:app --host 0.0.0.0 --port 8000 --workers 4"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ── arq Worker ──────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://drevalis:drevalis@postgres:5432/drevalis
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app/src
      # Worker writes its structlog stream into the shared volume so
      # the /api/v1/events endpoint can render worker errors alongside
      # the app's. Reading file is the same backend code; only the
      # path differs. See LOG_FILE on the app service for the matching
      # half of the mount.
      LOG_FILE: /var/log/drevalis/worker.json
    volumes:
      - ./storage:/app/storage
      - ./src:/app/src
      - drevalis_logs:/var/log/drevalis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # Defaults fit a small VPS (8-CPU / 16 GB). The worker can
          # legitimately use more on a workstation — raise via
          # WORKER_CPUS / WORKER_MEMORY in .env. arq's ``max_jobs=8``
          # caps in-flight jobs separately. The previous hard-coded
          # ``cpus: "20"`` exceeded any small VPS's host total and made
          # ``docker compose up`` outright refuse to start.
          cpus: "${WORKER_CPUS:-6}"
          memory: ${WORKER_MEMORY:-8G}
    # Use our wrapper instead of ``python -m arq`` directly: it
    # waits for redis DNS to register + TCP to accept before
    # invoking arq, so a slow Docker-DNS race after ``compose up``
    # doesn't immediately crash the worker with
    # ``socket.gaierror: [Errno -5] No address associated with
    # hostname``.
    command: python -m drevalis.workers
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'arq' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      # Matches the Redis arq retry budget (~35s) plus headroom for
      # alembic + module import. Without this, arq's slow first
      # connect could exceed the previous 30s window and supervised
      # restart-loop the worker before it ever managed to bind.
      start_period: 90s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ── Updater sidecar ─────────────────────────────────────────────────────────
  # Watches /shared/do_update; on flag, pulls new images + restarts the stack.
  # Needs access to the host's Docker socket + this compose project directory.
  updater:
    build:
      context: ./docker/updater
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/project
      - updater_shared:/shared
    environment:
      POLL_SECONDS: "15"

  # ── Frontend (Vite + React) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_PROXY_TARGET: http://app:8000
      VITE_WS_PROXY_TARGET: ws://app:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    # Read-only root filesystem — the frontend container serves a static
    # bundle, it never writes to its own filesystem. ``tmpfs`` mounts
    # for the few paths nginx must be able to write to (pid file,
    # cache dir, log dir) keep the container fully functional while
    # eliminating any post-compromise persistence / path-traversal
    # write surface.
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
      - /var/cache/nginx:rw,noexec,nosuid,size=128m
      - /var/log/nginx:rw,noexec,nosuid,size=32m

# ── Defaults applied to every service via YAML anchors ─────────────────
# Not every service can use ``read_only: true`` (ffmpeg writes to /tmp,
# piper-dl needs /storage), so the anchor only covers the universally-
# safe hardening: no-new-privileges + a minimal capability set. Each
# service block above already carries these explicitly where tuning
# differs (e.g. frontend needs CHOWN/SETUID to chown /var/log/nginx).
x-hardening-defaults: &hardening-defaults
  security_opt:
    - no-new-privileges:true

volumes:
  postgres_data:
  updater_shared:
  # Shared structlog stream for the /api/v1/events endpoint. Both ``app``
  # and ``worker`` mount this at /var/log/drevalis and write app.json /
  # worker.json respectively. The Event Log reader globs the directory
  # and merges by timestamp.
  drevalis_logs:
