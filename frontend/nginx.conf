# nginx serves the Vite production build and proxies API + WebSocket
# traffic to the FastAPI backend.
#
# The compose network has the backend reachable as ``app`` on port 8000.
# Customers never expose 8000 to the host — everything goes through this
# frontend container on port 3000.

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Upload size limit ──────────────────────────────────────────────
    # nginx defaults to 1 MB which 413-fails any non-trivial upload. The
    # frontend hosts video ingest (Assets → Import from Video) and
    # asset image uploads so we lift this to 5 GB. The backend has its
    # own 2 GiB cap on /api/v1/assets and a smaller bound on cover art,
    # so this only widens the gate — the FastAPI handlers are still
    # the source of truth for what's actually accepted.
    client_max_body_size 5g;
    client_body_timeout 600s;

    # Docker's embedded DNS (compose networks) — lets nginx resolve
    # ``app:8000`` on each request instead of at startup, so this
    # container doesn't crash if the backend takes longer to come up.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $backend "http://app:8000";

    # Production MIME types for bundler outputs
    types {
        application/javascript  js mjs;
        text/css                css;
        application/json        json;
        image/svg+xml           svg;
        text/html               html htm;
        image/png               png;
        image/jpeg              jpg jpeg;
        image/x-icon            ico;
        image/webp              webp;
        font/woff2              woff2;
    }
    default_type application/octet-stream;

    # ── API → FastAPI ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;  # long for generation jobs / large uploads
        proxy_connect_timeout 30s;
        proxy_buffering off;
    }

    # ── WebSockets → FastAPI ───────────────────────────────────────────
    location /ws/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade         $http_upgrade;
        proxy_set_header Connection      "upgrade";
        proxy_read_timeout 86400s;  # 24h — long-lived progress sockets
    }

    # ── Static storage (thumbnails, voice previews, audiobook outputs) ─
    location /storage/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # ── /health passthrough (for the installer script's readiness probe) ─
    location = /health {
        proxy_pass $backend;
    }

    # ── Static assets (cache-bust filenames from Vite) ─────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA index — must always come fresh so a new build is picked
    # up without the browser clinging to the previous index.html ───
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
        try_files $uri =404;
    }

    # ── SPA fallback: unknown paths → index.html (also no-cache) ───
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ───────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=(), browsing-topics=()" always;

    # ── Gzip ───────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
