# Demo/showcase Drevalis stack — lives on the VPS alongside the
# marketing site and the license server, used exclusively to render
# screenshots for drevalis.com.
#
# Intentionally NOT fronted by Nginx Proxy Manager — there's no public
# DNS for this, no reason to expose it. Playwright runs on the same
# VPS and hits localhost ports directly.
#
# Usage on the VPS:
#   cd /srv/drevalis-demo
#   cp .env.example .env                 # generated by the bring-up script
#   docker compose up -d
#   python3 /srv/drevalis-demo/seed_demo.py
#   python3 /srv/drevalis-demo/take_marketing_screenshots.py

name: drevalis-demo

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: drevalis
      POSTGRES_PASSWORD: drevalis
      POSTGRES_DB: drevalis
    # No host port — only the other services reach it.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drevalis"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/drevaliscs/creator-studio-app:stable
    restart: unless-stopped
    # Bind only to localhost on the VPS — Playwright reaches it via
    # this port without exposing the demo instance to the public.
    ports:
      - "127.0.0.1:18000:8000"
    networks: [default, proxy]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://drevalis:drevalis@postgres:5432/drevalis
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app/src
      DEMO_MODE: "true"
      DEMO_ASSETS_PATH: /app/infra/demo/assets
    volumes:
      - ./storage:/app/storage
      - ./demo_assets:/app/infra/demo/assets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    command: >
      sh -c "/app/.venv/bin/python -m alembic upgrade head &&
             exec /app/.venv/bin/python -m uvicorn drevalis.main:app --host 0.0.0.0 --port 8000 --workers 2"

  worker:
    image: ghcr.io/drevaliscs/creator-studio-app:stable
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://drevalis:drevalis@postgres:5432/drevalis
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app/src
      DEMO_MODE: "true"
      DEMO_ASSETS_PATH: /app/infra/demo/assets
    volumes:
      - ./storage:/app/storage
      - ./demo_assets:/app/infra/demo/assets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    command: python -m arq drevalis.workers.settings.WorkerSettings

  frontend:
    image: ghcr.io/drevaliscs/creator-studio-frontend:stable
    restart: unless-stopped
    ports:
      - "127.0.0.1:13000:3000"
    networks: [default, proxy]
    environment:
      VITE_PROXY_TARGET: http://app:8000
      VITE_WS_PROXY_TARGET: ws://app:8000
    depends_on:
      app:
        condition: service_healthy

  # Nightly reset — 04:00 UTC wipes the demo DB + storage and re-seeds.
  # Uses the same app image so it can import the seed script.
  reset:
    image: ghcr.io/drevaliscs/creator-studio-app:stable
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://drevalis:drevalis@postgres:5432/drevalis
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app/src
      DEMO_MODE: "true"
      DEMO_RESET_CRON: "0 4 * * *"  # 04:00 UTC, every day
    volumes:
      - ./storage:/app/storage
      - ./seed_demo.py:/app/seed_demo.py:ro
      - ./reset_demo.sh:/app/reset_demo.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "apk add --no-cache dcron tzdata postgresql-client >/dev/null 2>&1 || true;
       echo '$${DEMO_RESET_CRON} /app/reset_demo.sh >> /var/log/demo-reset.log 2>&1' | crontab -;
       touch /var/log/demo-reset.log;
       crond -f -l 2 &
       tail -F /var/log/demo-reset.log"

networks:
  default:
  proxy:
    external: true

volumes:
  postgres_data:
