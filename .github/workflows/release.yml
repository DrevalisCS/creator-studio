name: Release

# Fires on pushes of version tags (``v1.2.3``) and on the manual trigger.
# Builds the four production images, pushes them to GHCR tagged with the
# version AND ``stable``, then POSTs the new manifest to the license
# server so every licensed customer sees the "Update available" banner.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag images with (e.g. 1.2.3)'
        required: true

permissions:
  contents: read
  packages: write      # push to GHCR

env:
  REGISTRY: ghcr.io
  # Docker image paths are case-sensitive and must be lowercase. GitHub
  # owner names can be mixed-case (e.g. DrevalisCS), so we normalize.
  OWNER_LC: drevaliscs

jobs:
  build:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Single backend image used by both the API server (``app``) and
          # the arq worker; compose overrides the command for the worker.
          - image: creator-studio-app
            context: .
            dockerfile: Dockerfile
          - image: creator-studio-frontend
            context: ./frontend
            dockerfile: Dockerfile
          - image: creator-studio-updater
            context: ./docker/updater
            dockerfile: Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ matrix.image }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ matrix.image }}:stable
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

  publish-manifest:
    name: Publish update manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: POST to license server
        env:
          ADMIN_TOKEN: ${{ secrets.LICENSE_SERVER_ADMIN_TOKEN }}
          LICENSE_SERVER: ${{ vars.LICENSE_SERVER_URL }}
          VERSION: ${{ steps.ver.outputs.version }}
          OWNER_LC: drevaliscs
          REPO: ${{ github.repository }}
        run: |
          cat > manifest.json <<JSON
          {
            "current_stable": "$VERSION",
            "image_tags": {
              "app":      "ghcr.io/$OWNER_LC/creator-studio-app:$VERSION",
              "worker":   "ghcr.io/$OWNER_LC/creator-studio-app:$VERSION",
              "frontend": "ghcr.io/$OWNER_LC/creator-studio-frontend:$VERSION",
              "updater":  "ghcr.io/$OWNER_LC/creator-studio-updater:$VERSION"
            },
            "changelog_url": "https://github.com/$REPO/releases/tag/v$VERSION",
            "mandatory_security_update": false
          }
          JSON

          curl -fsSL -X POST "$LICENSE_SERVER/admin/updates/publish" \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @manifest.json
