name: CI

# Runs on every push + pull request to main.
# Each job gates on something that MUST pass to ship.
# Debt items that aren't yet enforced here are tracked in TECHDEBT.md.

on:
  push:
    branches: [main, "audit/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────── Python ───────────────────────────

  lint:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - name: ruff check
        run: ruff check src/ tests/
      - name: ruff format --check
        run: ruff format --check src/ tests/

  deps-audit:
    name: pip-audit (known CVEs)
    runs-on: ubuntu-latest
    # Non-blocking: surface advisories without gating releases.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit
      - name: pip-audit (strict, no cache)
        run: pip-audit --strict --disable-pip || true

  typecheck:
    name: Mypy (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]" && pip install python-multipart
      - name: mypy (whole package, strict-optional relaxed)
        run: mypy -p drevalis --no-strict-optional
      - name: mypy --strict (entire package)
        # As of v0.29.x the entire drevalis package is --strict clean.
        # Failing here means a regression on something that was previously
        # strict-clean — pin a `# type: ignore[code]` at the call site
        # rather than weakening the gate.
        run: mypy -p drevalis --strict

  test:
    name: Pytest (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]" && pip install python-multipart
      - name: Generate a CI-only Fernet key
        run: echo "ENCRYPTION_KEY=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> $GITHUB_ENV
      - name: Run unit tests (xfails are expected)
        # Stale tests are marked xfail in conftest.py; they run but don't fail the build.
        # See TECHDEBT.md §1 for the quarantine list.
        run: |
          pip install pytest-cov
          pytest tests/unit/ -v --cov=src/drevalis --cov-report=term --cov-report=xml
      - name: Summarise coverage on PRs
        if: github.event_name == 'pull_request'
        uses: orgoro/coverage@v3.1
        with:
          coverageFile: coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: 0.0
          thresholdNew: 0.0
          thresholdModified: 0.0
        continue-on-error: true

  # ─────────────────────────── Frontend ───────────────────────────

  frontend:
    name: Frontend typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: frontend
        # Lockfile is committed as of v0.19.35 — npm ci gives us a
        # reproducible install gated on package-lock.json.
        run: npm ci --no-audit --no-fund
      - name: TypeScript
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Production build
        working-directory: frontend
        run: npm run build

  # ─────────────────────────── Docker ───────────────────────────

  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: creator-studio-app:ci
          cache-from: type=gha,scope=app-ci
          cache-to: type=gha,scope=app-ci,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: creator-studio-frontend:ci
          cache-from: type=gha,scope=frontend-ci
          cache-to: type=gha,scope=frontend-ci,mode=max
      - name: Report image sizes
        # Size deltas on each PR let us notice bloat early. Outputs in the
        # GitHub Actions step summary so the PR reviewer sees the numbers
        # without opening a log.
        run: |
          {
            echo "## Docker image sizes"
            echo ""
            echo "| image | size |"
            echo "|-------|------|"
            for img in creator-studio-app:ci creator-studio-frontend:ci; do
              size=$(docker image inspect "$img" --format='{{.Size}}' | \
                awk '{printf "%.1f MB", $1/1024/1024}')
              echo "| $img | $size |"
            done
          } >> "$GITHUB_STEP_SUMMARY"
