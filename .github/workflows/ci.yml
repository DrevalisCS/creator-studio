name: CI

# Runs on every push + pull request to main.
# Each job gates on something that MUST pass to ship.
# Debt items that aren't yet enforced here are tracked in TECHDEBT.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────── Python ───────────────────────────

  lint:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - name: ruff check
        run: ruff check src/ tests/
      - name: ruff format --check
        run: ruff format --check src/ tests/

  typecheck:
    name: Mypy (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]" && pip install python-multipart
      - name: mypy
        run: mypy -p shortsfactory --no-strict-optional

  test:
    name: Pytest (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]" && pip install python-multipart
      - name: Generate a CI-only Fernet key
        run: echo "ENCRYPTION_KEY=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> $GITHUB_ENV
      - name: Run unit tests (xfails are expected)
        # Stale tests are marked xfail in conftest.py; they run but don't fail the build.
        # See TECHDEBT.md §1 for the quarantine list.
        run: pytest tests/unit/ -v

  # ─────────────────────────── Frontend ───────────────────────────

  frontend:
    name: Frontend typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: frontend
        # ``npm ci`` requires a lockfile; we don't commit one, so use ``npm install``.
        # Frontend is small enough that reproducibility at this level is acceptable
        # until we decide to commit package-lock.json.
        run: npm install
      - name: TypeScript
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Production build
        working-directory: frontend
        run: npm run build

  # ─────────────────────────── Docker ───────────────────────────

  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: creator-studio-app:ci
          cache-from: type=gha,scope=app-ci
          cache-to: type=gha,scope=app-ci,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: creator-studio-frontend:ci
          cache-from: type=gha,scope=frontend-ci
          cache-to: type=gha,scope=frontend-ci,mode=max
